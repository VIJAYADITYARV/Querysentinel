version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: querysentinel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: querysentinel
      POSTGRES_DB: querysentinel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: querysentinel_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@querysentinel.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  pgdata:
